<!--header with page title(movie name), home button and favourites button-->
<ion-header [translucent]="true">
  <ion-toolbar>

    <ion-buttons slot="start">
      <ion-back-button></ion-back-button>
    </ion-buttons>

    <ion-title>{{ movie.title }}</ion-title>
  
    <ion-buttons slot="end">
      <!--code to add a button to the right of another element, routing to favourites page-->
      <ion-button [routerLink]="['/home']">
        <ion-icon name="home-outline"></ion-icon>
      </ion-button>
      <ion-button [routerLink]="['/favourites']">
        <ion-icon name="heart"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">

  <p>{{movie.overview}}</p>
  
  <ion-button *ngIf="!isFavourite" (click)="addFavourites()" fill="outline">
    <ion-icon slot="start" name="heart-outline"></ion-icon>
    ADD TO FAVOURITES 
  </ion-button>

  <ion-button *ngIf="isFavourite" (click)="removeFavourites()">
    <ion-icon slot="start" name="heart"></ion-icon>
    REMOVE FROM FAVOURITES
  </ion-button>

  <ul>
    <h2>Cast</h2>
    <li *ngFor="let ca of castMember" style="list-style-type: none;">
      <ion-card [routerLink]="['/details', ca.id]">
        <img *ngIf="ca.profile_path" src="https://image.tmdb.org/t/p/w185{{ca.profile_path}}"/>
        <ion-item *ngIf="!ca.profile_path">
          <ion-label>
            No Image
          </ion-label>
        </ion-item>
        <ion-card-content>
          <ion-item *ngIf="ca.character"><h1>{{ ca.character }}</h1></ion-item>
          <ion-item *ngIf="ca.name">{{ ca.name }}</ion-item>
        </ion-card-content>
      </ion-card>
    </li>
    <h2>Crew</h2>
    <li *ngFor="let cr of crewMember" style="list-style-type: none;">
      <ion-card [routerLink]="['/details', cr.id]">
        <img *ngIf="cr.profile_path" src="https://image.tmdb.org/t/p/w185{{cr.profile_path}}"/>
        <ion-item *ngIf="!cr.profile_path">
          <ion-label>
            No Image
          </ion-label>
        </ion-item>
        <ion-card-content>
          <ion-item *ngIf="cr.job"><h1>{{ cr.job }}</h1></ion-item>
          <ion-item *ngIf="cr.name">{{ cr.name }}</ion-item>
        </ion-card-content>
      </ion-card>
    </li>
  </ul>

</ion-content>
