<!--header with page title(movie name), home button and favourites button-->
<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>{{ details.title }}</ion-title>
  
    <ion-buttons slot="end">
      <!--code to add a button to the right of another element, routing to favourites page-->
      <ion-button [routerLink]="['/home']">
        <ion-icon name="home-outline"></ion-icon>
      </ion-button>
      <ion-button [routerLink]="['/favourites']">
        <ion-icon name="heart"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <p>{{details.overview}}</p>
  <ion-button *ngIf="!isFavourite" (click)="addFavourites()" fill="outline">
    <ion-icon slot="start" name="heart-outline"></ion-icon>
    ADD TO FAVOURITES 
  </ion-button>

  <ion-button *ngIf="isFavourite" (click)="removeFavourites()">
    <ion-icon slot="start" name="heart"></ion-icon>
    REMOVE FROM FAVOURITES
  </ion-button>

  <ul>
    <li *ngFor="let info of castInformation" style="list-style-type: none;">
      <ion-card>
        <img src="https://image.tmdb.org/t/p/w185{{info.profile_path}}"/>
        <ion-card-content>{{ info.name }} as {{ info.character }}</ion-card-content>
      </ion-card>
    </li>
    <li *ngFor="let info of crewInformation" style="list-style-type: none;">
      <ion-card>
        <img src="https://image.tmdb.org/t/p/w185{{info.profile_path}}"/>
        <ion-card-content>{{ info.name }} {{ info.job }}</ion-card-content>
      </ion-card>
    </li>
  </ul>

</ion-content>
