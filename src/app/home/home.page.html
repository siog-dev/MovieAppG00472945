<!--header with app title(student number) and favourites button-->
<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>G00472945</ion-title>
  
    <ion-buttons slot="end">
      <!--code to add a button to the right of another element, routing to favourites page-->
      <ion-button [routerLink]="['/favourites']">
        <ion-icon name="heart"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <!--ngModel = two-way data binding, binding input value to 'searchTerm'-->
  <ion-input label="Search" [(ngModel)]="searchTerm" [clearInput]="true" placeholder="Movie Name"></ion-input>
  <!--click = event binding, onSearch() is called on a click event-->
  <ion-button (click)="onSearch()" expand="full" >SEARCH</ion-button>
  <ul>
    <!--ngFor loops through the movies array and creates a list of items-->
    <li *ngFor="let movie of movies" style="list-style-type: none;">
      <!--route to the movie-details page with this cards movie.id at the end-->
      <ion-card [routerLink]="['/movie-details', movie.id]">
        <img src="https://image.tmdb.org/t/p/w185{{movie.poster_path}}"/>
        <!--movie.id and movie.poster_path are currently displayed for testing purposes-->
        <ion-card-content>{{ movie.overview }}</ion-card-content>
      </ion-card>
    </li>
  </ul>
</ion-content>
