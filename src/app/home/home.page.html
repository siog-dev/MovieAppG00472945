<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>G00472945</ion-title>
  
    <ion-buttons slot="end">
      <!--code to add a button to the right of another element, routing to favourites page-->
      <ion-button [routerLink]="['/favourites']" fill="clear">
        <ion-icon name="heart"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <!--ngModel = two-way data binding, binding input value to 'searchTerm'-->
  <ion-input label="Search" [(ngModel)]="searchTerm" [clearInput]="true" placeholder="Movie Name"></ion-input>
  <!--click = event binding, onSearch() is called on a click event-->
  <ion-button (click)="onSearch()" expand="full" >SEARCH</ion-button>
  <ul>
    <li *ngFor="let movie of movies">
      {{ movie.overview }}
    </li>
  </ul>
</ion-content>
